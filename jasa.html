<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <title>Jasa - ADE</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: #191919;
      color: white;
    }

    /* HEADER */
    header {
      padding: 1rem 9%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 2rem;
      color: #e3651d;
      font-weight: bold;
      text-decoration: none;
    }

    .menu-toggle {
      display: none;
      font-size: 2rem;
      color: white;
      cursor: pointer;
    }

    nav {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      transition: 0.3s;
      padding-bottom: 5px;
    }

    nav a:hover,
    nav a.active {
      color: #e3651d;
      border-bottom: 2px solid #e3651d;
    }

    /* SECTION */
    .skills {
      padding: 7rem 9% 4rem;
      text-align: center;
    }

    .skills h1 {
      font-size: 3rem;
      margin-bottom: 3rem;
      color: #e3651d;
    }

    /* CARD */
    .skill {
      background: #262626;
      padding: 2rem;
      border-radius: 15px;
      margin-bottom: 2rem;
      transition: 0.3s;
      box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    }

    .skill:hover {
      transform: translateY(-5px);
      border: 1px solid #e3651d;
    }

    .skill h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .price {
      font-size: 1.3rem;
      color: #e3651d;
      margin-bottom: 1rem;
      font-weight: bold;
    }

    .skill-bar {
      width: 100%;
      height: 15px;
      background-color: #444;
      border-radius: 10px;
      overflow: hidden;
    }

    .skill-progress {
      height: 100%;
      background: #e3651d;
    }

    /* MOBILE */
    @media (max-width: 768px) {

      .menu-toggle {
        display: block;
      }

      nav {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: #222;
        padding: 1rem 0;
      }

      nav.active {
        display: flex;
      }

      nav a {
        text-align: center;
        padding: 1rem;
      }

      .skills h1 {
        font-size: 2.3rem;
      }

      .skill h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">ADE</a>

    <div class="menu-toggle" id="mobile-menu">
      <i class="fa fa-bars"></i>
    </div>

    <nav id="nav">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="skills.html">Skills</a>
      <a href="contact.html">Contact</a>
      <a href="jasa.html" class="active">Jasa</a>
    </nav>
  </header>

  <section class="skills">
    <h1>Daftar Jasa</h1>

    <div class="skill">
      <h2>Jasa Tukang Galon</h2>
      <div class="price">Rp 15.000</div>

      <div class="skill-bar">
        <div class="skill-progress" style="width:100%"></div>
      </div>
    </div>

    <div class="skill">
      <h2>Jasa Editing</h2>
      <div class="price">Rp 50.000</div>

      <div class="skill-bar">
        <div class="skill-progress" style="width:80%"></div>
      </div>
    </div>

    <div class="skill">
      <h2>Jasa Ambil Barang</h2>
      <div class="price">Rp 20.000</div>

      <div class="skill-bar">
        <div class="skill-progress" style="width:70%"></div>
      </div>
    </div>

    <div class="skill">
      <h2>Jasa Edit Poster</h2>
      <div class="price">Rp 35.000</div>

      <div class="skill-bar">
        <div class="skill-progress" style="width:65%"></div>
      </div>
    </div>

    <div class="skill">
      <h2>Jasa Edit PPT</h2>
      <div class="price">Rp 25.000</div>

      <div class="skill-bar">
        <div class="skill-progress" style="width:20%"></div>
      </div>
    </div>

  </section>

  <script>
    const mobileMenu = document.getElementById("mobile-menu");
    const nav = document.getElementById("nav");

    mobileMenu.addEventListener("click", () => {
      nav.classList.toggle("active");
    });
  </script>

</body>
</html>
